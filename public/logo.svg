<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Rounded App Badge Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="24" />
  
  <!-- Wrench and Connection Nodes Graphic -->
  <g transform="translate(256, 256) rotate(-15) translate(-256, -256)">
    <!-- Diagonal Connection Line -->
    <line x1="160" y1="352" x2="352" y2="160" stroke="#ffffff" stroke-width="36" stroke-linecap="round" />
    
    <!-- Connection Nodes -->
    <circle cx="160" cy="352" r="32" fill="#38bdf8" stroke="#ffffff" stroke-width="12" />
    <circle cx="352" cy="160" r="32" fill="#38bdf8" stroke="#ffffff" stroke-width="12" />
    
    <!-- Central Gear / Wrench Symbol -->
    <path d="M 220 220 L 292 292 M 292 220 L 220 292" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
  </g>
  
  <!-- Star Accent -->
  <polygon points="256,120 268,148 298,148 274,166 283,194 256,176 229,194 238,166 214,148 244,148" fill="#fbbf24" />
</svg>
